name: 'MCP Trust Checker — MCP Security Scan'
description: 'Scan a Model Context Protocol server for security issues and gate CI on its Trust Score.'
author: 'MCP Trust Checker (https://mcptrustchecker.com · support@mcptrustchecker.com)'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  target:
    description: 'What to scan: a tools.json manifest, an http(s) URL, a client config, or a package name.'
    required: true
  min-grade:
    description: 'Fail if the grade is worse than this (A–F).'
    required: false
  fail-under:
    description: 'Fail if the Trust Score is below this (0–100).'
    required: false
  sarif:
    description: 'Produce a SARIF file and upload it to the Security tab.'
    required: false
    default: 'false'
  config:
    description: 'Path to a mcptrustchecker.config.json.'
    required: false
  extra-args:
    description: 'Additional raw CLI arguments (e.g. "--online --include-builtins").'
    required: false
    default: ''
  version:
    description: 'MCP Trust Checker version to run (npm dist-tag or version).'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run MCP Trust Checker
      shell: bash
      run: |
        args=""
        [ -n "${{ inputs.min-grade }}" ] && args="$args --min-grade ${{ inputs.min-grade }}"
        [ -n "${{ inputs.fail-under }}" ] && args="$args --fail-under ${{ inputs.fail-under }}"
        [ -n "${{ inputs.config }}" ] && args="$args --config ${{ inputs.config }}"
        [ "${{ inputs.sarif }}" = "true" ] && args="$args --sarif -o mcptrustchecker.sarif"
        echo "mcptrustchecker ${{ inputs.version }} scanning: ${{ inputs.target }}"
        npx --yes mcptrustchecker@${{ inputs.version }} scan "${{ inputs.target }}" ${{ inputs.extra-args }} $args

    - name: Upload SARIF
      if: ${{ inputs.sarif == 'true' && always() }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: mcptrustchecker.sarif
