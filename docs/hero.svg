  <text x="24" y="176"><tspan class="g">Surface</tspan> <tspan class="t">3 tools · 0 prompts · 0 resources</tspan></text>

  <rect x="46" y="198" width="150" height="44" rx="8" fill="none" stroke="#e3b341" stroke-width="1.5"/>
  <text x="121" y="225" text-anchor="middle" class="amb b" font-size="16">GRADE  D</text>
